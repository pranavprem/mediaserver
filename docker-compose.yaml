services:

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │  ░█▀█░█▀▀░▀█▀░█░█░█▀█░█▀▄░█░█                                                │
# │  ░█░█░█▀▀░░█░░█▄█░█░█░█▀▄░█▀▄                                                │
# │  ░▀░▀░▀▀▀░░▀░░▀░▀░▀▀▀░▀░▀░▀░▀                                                │
# │  VPN Gateway & Tunnel Services                                               │
# ╰──────────────────────────────────────────────────────────────────────────────╯

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=Switzerland
      - PORT_FORWARDING=on
      - FIREWALL=outgoing
    ports:
      - ${QBITTORRENT_TORRENT_PORT}:${QBITTORRENT_TORRENT_PORT}/tcp
      - ${QBITTORRENT_PORT}:${QBITTORRENT_PORT}
      - ${SABNZBD_PORT}:8080
      - ${PROWLARR_PORT}:${PROWLARR_PORT}
      - ${RADARR_PORT}:${RADARR_PORT}
      - ${SONARR_PORT}:${SONARR_PORT}
      - ${READARR_PORT}:${READARR_PORT}
    volumes:
      - ${CONFIG_ROOT}/gluetun:/gluetun
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    restart: unless-stopped

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │  ░█▀▄░█▀█░█░█░█▀█░█░░░█▀█░█▀█░█▀▄░█▀▀                                        │
# │  ░█░█░█░█░█▄█░█░█░█░░░█░█░█▀█░█░█░▀▀█                                        │
# │  ░▀▀░░▀▀▀░▀░▀░▀░▀░▀▀▀░▀▀▀░▀░▀░▀▀░░▀▀▀                                        │
# │  Torrent & Usenet Clients                                                    │
# ╰──────────────────────────────────────────────────────────────────────────────╯

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${QBITTORRENT_PORT}
    volumes:
      - ${CONFIG_ROOT}/qbittorrent:/config
      - ${DOWNLOADS_ROOT}:/downloads
    depends_on:
      - gluetun
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    network_mode: service:gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/sabnzbd:/config
      - ${DOWNLOADS_ROOT}:/downloads
      - ${DOWNLOADS_ROOT}/incomplete:/incomplete-downloads
    depends_on:
      - gluetun
    restart: unless-stopped

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │  ░█▀█░█▀▄░█▀▄░░░█▀▀░▀█▀░█▀█░█▀▀░█░█                                          │
# │  ░█▀█░█▀▄░█▀▄░░░▀▀█░░█░░█▀█░█░░░█▀▄                                          │
# │  ░▀░▀░▀░▀░▀░▀░░░▀▀▀░░▀░░▀░▀░▀▀▀░▀░▀                                          │
# │  Media Management & Automation                                               │
# ╰──────────────────────────────────────────────────────────────────────────────╯

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: service:gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/prowlarr:/config
    depends_on:
      - gluetun
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: service:gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/radarr:/config
      - ${DOWNLOADS_ROOT}:/downloads
      - ${MOVIES_ROOT}:/movies
    depends_on:
      - gluetun
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: service:gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/sonarr:/config
      - ${DOWNLOADS_ROOT}:/downloads
      - ${TV_ROOT}:/tv
    depends_on:
      - gluetun
    restart: unless-stopped

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │  ░█▄█░█▀▀░█▀▄░▀█▀░█▀█░░░█▀▀░█▀▀░█▀▄░█░█░█▀▀░█▀▄░█▀▀                          │
# │  ░█░█░█▀▀░█░█░░█░░█▀█░░░▀▀█░█▀▀░█▀▄░▀▄▀░█▀▀░█▀▄░▀▀█                          │
# │  ░▀░▀░▀▀▀░▀▀░░▀▀▀░▀░▀░░░▀▀▀░▀▀▀░▀░▀░░▀░░▀▀▀░▀░▀░▀▀▀                          │
# │  Streaming & Library Access                                                  │
# ╰──────────────────────────────────────────────────────────────────────────────╯

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/jellyfin:/config
      - ${MOVIES_ROOT}:/movies
      - ${TV_ROOT}:/tv
    ports:
      - ${JELLYFIN_PORT}:8096
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - LOG_LEVEL=info
    volumes:
      - ${CONFIG_ROOT}/jellyseerr:/app/config
    ports:
      - ${JELLYSEERR_PORT}:5055
    restart: unless-stopped

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - ${CONFIG_ROOT}/plex:/config
      - ${MOVIES_ROOT}:/movies
      - ${TV_ROOT}:/tv
    ports:
      - ${PLEX_PORT}:32400
    restart: unless-stopped

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │  Vaultwarden - Password Manager (Cloudflare tunnel: vault.pranavprem.com)    │
# ╰──────────────────────────────────────────────────────────────────────────────╯

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    user: ${PUID}:${PGID}
    environment:
      - DOMAIN=${VAULTWARDEN_DOMAIN}
      - ROCKET_PORT=7777
      - SIGNUPS_ALLOWED=${VAULTWARDEN_SIGNUPS_ALLOWED:-false}
      - INVITATIONS_ALLOWED=false
      - SHOW_PASSWORD_HINT=false
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
    volumes:
      - ${CONFIG_ROOT}/vaultwarden:/data
    restart: unless-stopped

