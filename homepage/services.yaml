---
# ─── Media ───────────────────────────────────────────────────────────────────
- Media:
    - Jellyfin:
        icon: jellyfin.png
        href: http://{{HOMEPAGE_VAR_NAS_IP}}:${JELLYFIN_PORT:-8096}
        description: Media streaming
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
          enableBlocks: true
          enableNowPlaying: true

    - Jellyseerr:
        icon: jellyseerr.png
        href: http://{{HOMEPAGE_VAR_NAS_IP}}:${JELLYSEERR_PORT:-5055}
        description: Media requests
        widget:
          type: jellyseerr
          url: http://jellyseerr:5055
          key: "{{HOMEPAGE_VAR_JELLYSEERR_KEY}}"

    - Plex:
        icon: plex.png
        href: http://{{HOMEPAGE_VAR_NAS_IP}}:32400/web
        description: Media streaming (alt)

# ─── Downloads ───────────────────────────────────────────────────────────────
- Downloads:
    - Sonarr:
        icon: sonarr.png
        href: http://{{HOMEPAGE_VAR_NAS_IP}}:8989
        description: TV shows
        widget:
          type: sonarr
          url: http://gluetun:8989
          key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
          enableQueue: true

    - Radarr:
        icon: radarr.png
        href: http://{{HOMEPAGE_VAR_NAS_IP}}:7878
        description: Movies
        widget:
          type: radarr
          url: http://gluetun:7878
          key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
          enableQueue: true

    - Prowlarr:
        icon: prowlarr.png
        href: http://{{HOMEPAGE_VAR_NAS_IP}}:9696
        description: Indexer manager
        widget:
          type: prowlarr
          url: http://gluetun:9696
          key: "{{HOMEPAGE_VAR_PROWLARR_KEY}}"
          enableIndexers: true

# ─── Infrastructure ──────────────────────────────────────────────────────────
- Infrastructure:
    - Home Assistant:
        icon: home-assistant.png
        href: http://{{HOMEPAGE_VAR_NAS_IP}}:8123
        description: Smart home control
        widget:
          type: homeassistant
          url: http://{{HOMEPAGE_VAR_NAS_IP}}:8123
          key: "{{HOMEPAGE_VAR_HASS_KEY}}"

    - Portainer:
        icon: portainer.png
        href: http://{{HOMEPAGE_VAR_NAS_IP}}:9000
        description: Container management
        widget:
          type: portainer
          url: http://portainer:9000
          env: 1
          key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"

    - Vaultwarden:
        icon: vaultwarden.png
        href: https://vault.pranavprem.com
        description: Password manager

    - UGREEN NAS:
        icon: mdi-nas-#64B5F6
        href: http://{{HOMEPAGE_VAR_NAS_IP}}
        description: NAS management UI

    - Gitea:
        icon: gitea.png
        href: http://{{HOMEPAGE_VAR_NAS_IP}}:41234
        description: Self-hosted Git

    - Immich:
        icon: immich.png
        href: http://{{HOMEPAGE_VAR_NAS_IP}}:2283
        description: Photo management

# ─── Monitoring ──────────────────────────────────────────────────────────────
- Monitoring:
    - Grafana:
        icon: grafana.png
        href: http://{{HOMEPAGE_VAR_NAS_IP}}:${GRAFANA_PORT:-3333}
        description: Dashboards & metrics
        widget:
          type: grafana
          url: http://grafana:3000
          username: "{{HOMEPAGE_VAR_GRAFANA_USER}}"
          password: "{{HOMEPAGE_VAR_GRAFANA_PASS}}"

    - Dozzle:
        icon: dozzle.png
        href: http://{{HOMEPAGE_VAR_NAS_IP}}:${DOZZLE_PORT:-9999}
        description: Container logs

    - Oracle Trading:
        icon: mdi-chart-line-#4CAF50
        href: https://oracle.pranavprem.com/dashboard
        description: TQQQ trading system

# ─── Live Views ──────────────────────────────────────────────────────────────
- Live Views:
    - Grafana - Mediaserver:
        widget:
          type: iframe
          src: http://{{HOMEPAGE_VAR_NAS_IP}}:${GRAFANA_PORT:-3333}/d/mediaserver/mediaserver?orgId=1&kiosk
          classes: h-96 sm:h-96 md:h-96 lg:h-96 xl:h-96 2xl:h-96
          refreshInterval: 30000

    - Grafana - Oracle:
        widget:
          type: iframe
          src: http://{{HOMEPAGE_VAR_NAS_IP}}:${GRAFANA_PORT:-3333}/d/oracle-trading/oracle-trading-system?orgId=1&kiosk
          classes: h-96 sm:h-96 md:h-96 lg:h-96 xl:h-96 2xl:h-96
          refreshInterval: 30000

# ─── External ────────────────────────────────────────────────────────────────
- External:
    - Claude Usage:
        icon: mdi-robot-#F59E0B
        href: https://console.anthropic.com/settings/usage
        description: API usage dashboard

    - Perplexity:
        icon: mdi-magnify-#7C3AED
        href: https://www.perplexity.ai
        description: AI search
