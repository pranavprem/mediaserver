#
# This syncs quality profiles, custom formats, and scores from TRaSH Guides
# Copy this to: /volume1/media/config/recyclarr/recyclarr.yml
#
# Docs: https://recyclarr.dev/wiki/yaml/config-reference/

# ─── SONARR ──────────────────────────────────────────────────────────────────
sonarr:
  series:
    base_url: http://10.0.0.116:8989
    api_key: YOUR_SONARR_API_KEY_HERE
    
    # Delete custom formats not in this config
    delete_old_custom_formats: true
    replace_existing_custom_formats: true

    quality_definition:
      type: series

    quality_profiles:
      - name: WEB-1080p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: WEB 1080p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: HDTV-1080p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: HDTV-720p
          - name: WEB 480p
            qualities:
              - WEBDL-480p
              - WEBRip-480p
          - name: DVD
          - name: SDTV

    custom_formats:
      # ─── Unwanted ───
      - trash_ids:
          - 85c61753df5da1fb2aab6f2a47426b09  # BR-DISK
          - 9c11cd3f07101cdba90a2d81cf0e56b4  # LQ
          - e2315f990da2e2cbfc9fa5b7a6c62e78  # LQ (Release Title)
          - 47435ece6b99a0b477caf360e79ba0bb  # x265 (HD)
          - fbcb31d8dabd2a319072b84fc0b7249c  # Extras
        assign_scores_to:
          - name: WEB-1080p
            score: -10000

      # ─── Preferred ───
      - trash_ids:
          - ec8fa7296b64e8cd390a1600f3c9dc7c  # Repack/Proper
          - eb3d5cc0a2be0db205fb823640db6a3c  # Repack2
          - 44e7c4de10ae50265753082e5dc76047  # Repack3
        assign_scores_to:
          - name: WEB-1080p
            score: 5

      # ─── Streaming Services (prefer) ───
      - trash_ids:
          - d660701077794679fd59e8bdf4ce3a29  # AMZN
          - f67c9ca88f463a48346062e8ad07713f  # ATVP
          - 36b72f59f4ea20aad9316f475f2d9fbb  # DCU
          - 89358767a60cc28783cdc3d0be9388a4  # DSNP
          - 7a235133c87f7da4c8571f0b56bea82d  # HBO
          - a880d6abc21e7c16884f3ae393f84179  # HMAX
          - f6cce30f1733d5c8194222a7507909bb  # HULU
          - 0ac24a2a68a9700bcb7eeca8e5cd644c  # iT
          - 81d1fbf600e2540cee87f3a23f9d3c1c  # MAX
          - d34870697c9db575f17700212167be23  # NF
          - b2b980877494b560443631eb1f473867  # PMTP
          - 1656adc6d7bb2c8cca6acfb6592db421  # PCOK
          - c67a75ae4a1715f2bb4d492f17f5c9d0  # STAN
        assign_scores_to:
          - name: WEB-1080p
            score: 50

      # ─── HDR Formats (if you want them) ───
      - trash_ids:
          - 7878c33f1c7f4cc7a042ad82c93f4494  # DV HDR10+
          - 6d0d8de7b57e35518ac0308b0ddf404e  # DV HDR10
          - 1f733af03141f068a540eec352589a89  # DV HLG
          - 27954b0a80571f9b0e1f40ae38221c36  # DV SDR
          - a3d82cbef5039f8d295478d28a887159  # HDR10+
          - 3497799d29a085e2ac2df9d468413c94  # HDR10
          - 3e2c4e748b64a1a1118e0ea3f4cf6875  # HDR
          - bb019e1cd00f304f80971c965de064dc  # HLG
        assign_scores_to:
          - name: WEB-1080p
            score: 100

# ─── RADARR ──────────────────────────────────────────────────────────────────
radarr:
  movies:
    base_url: http://10.0.0.116:7878
    api_key: YOUR_RADARR_API_KEY_HERE

    delete_old_custom_formats: true
    replace_existing_custom_formats: true

    quality_definition:
      type: movie

    quality_profiles:
      - name: HD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-1080p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: Bluray-720p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: Bluray-576p
